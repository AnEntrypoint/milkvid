name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Compute next version tag
        id: tag
        run: |
          latest=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch+1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Build Windows x64
        run: bun build --compile --target=bun-windows-x64 --outfile=milkvid-windows.exe server.js

      - name: Build Linux x64
        run: bun build --compile --target=bun-linux-x64 --outfile=milkvid-linux server.js

      - name: Build macOS arm64
        run: bun build --compile --target=bun-darwin-arm64 --outfile=milkvid-macos server.js

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: milkvid ${{ steps.tag.outputs.tag }}
          body: |
            Portable milkvid binaries. Extract and run — no Node.js required.
            Place `presets/` and `thumbnails/` directories alongside the binary.
          files: |
            milkvid-windows.exe
            milkvid-linux
            milkvid-macos
