<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>*{margin:0;padding:0;overflow:hidden}</style></head>
<body>
<canvas id="c"></canvas>
<script src="butterchurn.js"></script>
<script src="butterchurnPresets.js"></script>
<script>
window._ready = false;
window._viz = null;
window._canvas = null;

window.initViz = function(width, height, presetIndex) {
  const canvas = document.getElementById('c');
  canvas.width = width;
  canvas.height = height;
  window._canvas = canvas;

  const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
  const viz = butterchurn.default.createVisualizer(gl, canvas, {
    width, height,
    meshWidth: 32,
    meshHeight: 24,
    pixelRatio: 1.0
  });

  const presets = butterchurnPresets.getPresets();
  const names = Object.keys(presets);
  const preset = presets[names[presetIndex % names.length]];
  viz.loadPreset(preset, 0.0);
  window._viz = viz;
  window._ready = true;
  return names[presetIndex % names.length];
};

window.renderFrame = function(timeByteArray, elapsedTime) {
  const arr = new Uint8Array(timeByteArray);
  window._viz.render({
    audioLevels: { timeByteArray: arr, timeByteArrayL: arr, timeByteArrayR: arr },
    elapsedTime
  });
  return window._canvas.toDataURL('image/png');
};
</script>
</body>
</html>
